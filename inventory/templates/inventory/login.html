<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>IMS Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>

        body{

            height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            background:linear-gradient(
                135deg,
                #4f46e5,
                #7c3aed,
                #2563eb
            );

            font-family:'Segoe UI',sans-serif;
        }

        .login-card{

            width:420px;

            border:none;

            border-radius:25px;

            padding:40px;

            background:rgba(
                255,
                255,
                255,
                0.15
            );

            backdrop-filter:blur(15px);

            box-shadow:0 10px 40px rgba(
                0,
                0,
                0,
                0.2
            );

            color:white;
        }

        .logo{

            text-align:center;

            margin-bottom:25px;
        }

        .logo i{

            font-size:55px;
        }

        .logo h2{

            margin-top:10px;

            font-weight:700;
        }

        .form-control{

            border-radius:12px;

            padding:12px;
        }

        .btn-login{

            width:100%;

            border-radius:12px;

            padding:12px;

            font-weight:600;

            transition:.3s;
        }

        .btn-login:hover{

            transform:translateY(-2px);
        }

        .subtitle{

            text-align:center;

            margin-bottom:25px;

            opacity:.9;
        }

    </style>

</head>

<body>

<div class="login-card">

    <div class="logo">

        <i class="fas fa-boxes-stacked"></i>

        <h2>
            IMS
        </h2>

    </div>

    <p class="subtitle">

        Inventory Management System

    </p>

    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">

            <label>

                Username

            </label>

            <input type="text"
                   name="username"
                   class="form-control"
                   required>

        </div>

        <div class="mb-4">

            <label>

                Password

            </label>

            <input type="password"
                   name="password"
                   class="form-control"
                   required>

        </div>

        <button
            type="submit"
            class="btn btn-light btn-login">

            <i class="fas fa-sign-in-alt"></i>

            Login

        </button>

    </form>

</div>

</body>
</html>
