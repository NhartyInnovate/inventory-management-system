{% extends 'inventory/base.html' %}

{% block content %}

<h2>Stock In</h2>

<hr>

<div class="card">

    <div class="card-body">

        <h4>
            {{ item.name }}
        </h4>

        <p>
            Current Quantity:
            <strong>
                {{ item.quantity }}
            </strong>
        </p>

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button
                class="btn btn-success">

                Add Stock

            </button>

        </form>

    </div>

</div>

{% endblock %}
