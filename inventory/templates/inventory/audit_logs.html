{% extends 'inventory/base.html' %}

{% block content %}

<h2>Audit Logs</h2>

<hr>

<table id="auditTable"
class="table table-hover">

    <thead>

        <tr>
            <th>Date</th>
            <th>User</th>
            <th>Action</th>
            <th>Description</th>
        </tr>

    </thead>

    <tbody>

        {% for log in logs %}

        <tr>

            <td>
                {{ log.timestamp }}
            </td>

            <td>
                {{ log.user.username }}
            </td>

            <td>
                {{ log.action }}
            </td>

            <td>
                {{ log.description }}
            </td>

        </tr>

        {% endfor %}

    </tbody>

</table>

{% endblock %}

<script>

$(document).ready(function(){

    $('#auditTable').DataTable();

});

</script>
